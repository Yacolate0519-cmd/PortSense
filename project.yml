name: PortSense
options:
  bundleIdPrefix: com.portsense
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"

targets:
  PortSense:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    dependencies:
      - package: Sparkle
    sources:
      - path: PortSense
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: "Port Sense"
        PRODUCT_BUNDLE_IDENTIFIER: com.portsense.app
        INFOPLIST_FILE: PortSense/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
